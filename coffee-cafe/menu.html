<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — Brewhaus Café</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo"><span>☕</span> Brewhaus</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="menu.html" class="nav-link active">Menu</a>
      <a href="orders.html" class="nav-link">My Orders</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="nav-cart-btn">
        🛒 Cart
        <span class="cart-badge" id="cart-badge-nav">0</span>
      </a>
      <a href="login.html" class="nav-login-link"><span>👤</span> Sign In</a>
      <div class="nav-profile-link">
        <img src="" alt="" class="user-avatar" />
        <span class="user-display-name"></span>
        <div class="profile-dropdown">
          <a href="orders.html" class="dropdown-item">📋 My Orders</a>
          <button class="dropdown-item danger" onclick="signOut()">↩ Sign Out</button>
        </div>
      </div>
    </div>
    <div class="hamburger" onclick="toggleMobileMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html" class="nav-link">Home</a>
  <a href="menu.html" class="nav-link active">Menu</a>
  <a href="cart.html" class="nav-link">🛒 Cart</a>
  <a href="orders.html" class="nav-link">My Orders</a>
  <a href="login.html" class="nav-link nav-login-link">Sign In</a>
  <button class="nav-link dropdown-item danger nav-profile-link" onclick="signOut()">Sign Out</button>
</div>

<!-- MENU HERO -->
<div class="menu-hero">
  <h1 class="section-title">Our Menu</h1>
  <p class="section-subtitle" style="margin-bottom:0">From single-origin pour-overs to seasonal specials</p>
</div>

<!-- TABLE BANNER (QR ordering) -->
<div class="table-banner-wrapper" id="table-banner-wrapper">
  <div class="table-banner">
    📍 You're ordering for <strong id="table-banner">—</strong>
  </div>
</div>

<!-- CONTROLS -->
<div class="menu-controls">
  <div class="category-tabs">
    <button class="category-btn active" data-category="all">☕ All</button>
    <button class="category-btn" data-category="coffee">Coffee</button>
    <button class="category-btn" data-category="specialty">Specialty</button>
    <button class="category-btn" data-category="pastry">🥐 Pastries</button>
  </div>
  <div class="menu-search-wrap">
    <svg class="menu-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="menu-search" class="form-input" placeholder="Search drinks & pastries..." />
  </div>
</div>

<!-- MENU GRID -->
<div class="menu-grid" id="menu-grid">
  <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted)">Loading menu...</div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-logo">☕ Brewhaus</div>
  <p>Open daily 7am–9pm · Fresh roasted every week</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/menu.js"></script>
<script>
  function toggleMobileMenu() {
    document.getElementById('mobile-menu').classList.toggle('open');
  }
</script>
</body>
</html>
